  <script id="search-index" type="application/json">[{"paper_id": "arXiv:2603.05504", "submission_date": "2026-03-06", "title": "RoboPocket: Improve Robot Policies Instantly with Your Phone", "abstract": "Scaling imitation learning is fundamentally constrained by the efficiency of data collection. While handheld interfaces have emerged as a scalable solution for in-the-wild data acquisition, they predominantly operate in an open-loop manner: operators blindly collect demonstrations without knowing the underlying policy's weaknesses, leading to inefficient coverage of critical state distributions. Conversely, interactive methods like DAgger effectively address covariate shift but rely on physical robot execution, which is costly and difficult to scale. To reconcile this trade-off, we introduce RoboPocket, a portable system that enables Robot-Free Instant Policy Iteration using single consumer smartphones. Its core innovation is a Remote Inference framework that visualizes the policy's predicted trajectory via Augmented Reality (AR) Visual Foresight. This immersive feedback allows collectors to proactively identify potential failures and focus data collection on the policy's weak regions without requiring a physical robot. Furthermore, we implement an asynchronous Online Finetuning pipeline that continuously updates the policy with incoming data, effectively closing the learning loop in minutes. Extensive experiments demonstrate that RoboPocket adheres to data scaling laws and doubles the data efficiency compared to offline scaling strategies, overcoming their long-standing efficiency bottleneck. Moreover, our instant iteration loop also boosts sample efficiency by up to 2$\\times$ in distributed environments a small number of interactive corrections per person. Project page and videos: this https URL .", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.05504", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05493", "submission_date": "2026-03-06", "title": "cuRoboV2: Dynamics-Aware Motion Generation with Depth-Fused Distance Fields for High-DoF Robots", "abstract": "Effective robot autonomy requires motion generation that is safe, feasible, and reactive. Current methods are fragmented: fast planners output physically unexecutable trajectories, reactive controllers struggle with high-fidelity perception, and existing solvers fail on high-DoF systems. We present cuRoboV2, a unified framework with three key innovations: (1) B-spline trajectory optimization that enforces smoothness and torque limits; (2) a GPU-native TSDF/ESDF perception pipeline that generates dense signed distance fields covering the full workspace, unlike existing methods that only provide distances within sparsely allocated blocks, up to 10x faster and in 8x less memory than the state-of-the-art at manipulation scale, with up to 99% collision recall; and (3) scalable GPU-native whole-body computation, namely topology-aware kinematics, differentiable inverse dynamics, and map-reduce self-collision, that achieves up to 61x speedup while also extending to high-DoF humanoids (where previous GPU implementations fail). On benchmarks, cuRoboV2 achieves 99.7% success under 3kg payload (where baselines achieve only 72--77%), 99.6% collision-free IK on a 48-DoF humanoid (where prior methods fail entirely), and 89.5% retargeting constraint satisfaction (vs. 61% for PyRoki); these collision-free motions yield locomotion policies with 21% lower tracking error than PyRoki and 12x lower cross-seed variance than mink. A ground-up codebase redesign for discoverability enabled LLM coding assistants to author up to 73% of new modules, including hand-optimized CUDA kernels, demonstrating that well-structured robotics code can unlock productive human--LLM collaboration. Together, these advances provide a unified, dynamics-aware motion generation stack that scales from single-arm manipulators to full humanoids.", "overview": "Presents a unified GPU-native motion generation stack combining B-spline trajectory optimization with torque limits, fast dense TSDF/ESDF perception, and scalable whole-body kinematics and dynamics. Achieves large speedups and near-perfect success rates from manipulators to 48-DoF humanoids, enabling collision-aware, dynamics-feasible motions suitable for both manipulation and locomotion.", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.05493", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05487", "submission_date": "2026-03-06", "title": "Observing and Controlling Features in Vision-Language-Action Models", "abstract": "Vision-Language-Action Models (VLAs) have shown remarkable progress towards embodied intelligence. While their architecture partially resembles that of Large Language Models (LLMs), VLAs exhibit higher complexity due to their multi-modal inputs/outputs and often hybrid nature of transformer and diffusion heads. This is part of the reason why insights from mechanistic interpretability in LLMs, which explain how the internal model representations relate to their output behavior, do not trivially transfer to VLA counterparts. In this work, we propose to close this gap by introducing and analyzing two main concepts: feature-observability and feature-controllability. In particular, we first study features that are linearly encoded in representation space, and show how they can be observed by means of a linear classifier. Then, we use a minimal linear intervention grounded in optimal control to accurately place internal representations and steer the VLA's output towards a desired region. Our results show that targeted, lightweight interventions can reliably steer a robot's behavior while preserving closed-loop capabilities. We demonstrate on different VLA architectures ($\\pi_{0.5}$ and OpenVLA) through simulation experiments that VLAs possess interpretable internal structure amenable to online adaptation without fine-tuning, enabling real-time alignment with user preferences and task requirements.", "overview": "Applies mechanistic interpretability concepts to VLAs by defining feature-observability and feature-controllability in their internal representations. Demonstrates that linear probes and minimal optimal-control-based interventions can steer π0.5 and OpenVLA behaviors online without fine-tuning, enabling real-time preference alignment and behavior correction in robotic control.", "institution_tags": ["Stanford University"], "institution_match": true, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.05487", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05410", "submission_date": "2026-03-06", "title": "PhysiFlow: Physics-Aware Humanoid Whole-Body VLA via Multi-Brain Latent Flow Matching and Robust Tracking", "abstract": "In the domain of humanoid robot control, the fusion of Vision-Language-Action (VLA) with whole-body control is essential for semantically guided execution of real-world tasks. However, existing methods encounter challenges in terms of low VLA inference efficiency or an absence of effective semantic guidance for whole-body control, resulting in instability in dynamic limb-coordinated tasks. To bridge this gap, we present a semantic-motion intent guided, physics-aware multi-brain VLA framework for humanoid whole-body control. A series of experiments was conducted to evaluate the performance of the proposed framework. The experimental results demonstrated that the framework enabled reliable vision-language-guided full-body coordination for humanoid robots.", "overview": "Introduces a physics-aware, multi-brain VLA framework that links semantic intent to whole-body humanoid control. The system couples latent flow matching with robust tracking to produce stable, vision-language-guided full-body coordinated behaviors on humanoid robots.", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.05410", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05385", "submission_date": "2026-03-06", "title": "Accelerating Sampling-Based Control via Learned Linear Koopman Dynamics", "abstract": "This paper presents an efficient model predictive path integral (MPPI) control framework for systems with complex nonlinear dynamics. To improve the computational efficiency of classic MPPI while preserving control performance, we replace the nonlinear dynamics used for trajectory propagation with a learned linear deep Koopman operator (DKO) model, enabling faster rollout and more efficient trajectory sampling. The DKO dynamics are learned directly from interaction data, eliminating the need for analytical system models. The resulting controller, termed MPPI-DK, is evaluated in simulation on pendulum balancing and surface vehicle navigation tasks, and validated on hardware through reference-tracking experiments on a quadruped robot. Experimental results demonstrate that MPPI-DK achieves control performance close to MPPI with true dynamics while substantially reducing computational cost, enabling efficient real-time control on robotic platforms.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.05385", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05377", "submission_date": "2026-03-06", "title": "OpenFrontier: General Navigation with Visual-Language Grounded Frontiers", "abstract": "Open-world navigation requires robots to make decisions in complex everyday environments while adapting to flexible task requirements. Conventional navigation approaches often rely on dense 3D reconstruction and hand-crafted goal metrics, which limits their generalization across tasks and environments. Recent advances in vision--language navigation (VLN) and vision--language--action (VLA) models enable end-to-end policies conditioned on natural language, but typically require interactive training, large-scale data collection, or task-specific fine-tuning with a mobile agent. We formulate navigation as a sparse subgoal identification and reaching problem and observe that providing visual anchoring targets for high-level semantic priors enables highly efficient goal-conditioned navigation. Based on this insight, we select navigation frontiers as semantic anchors and propose OpenFrontier, a training-free navigation framework that seamlessly integrates diverse vision--language prior models. OpenFrontier enables efficient navigation with a lightweight system design, without dense 3D mapping, policy training, or model fine-tuning. We evaluate OpenFrontier across multiple navigation benchmarks and demonstrate strong zero-shot performance, as well as effective real-world deployment on a mobile robot.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.05377", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05355", "submission_date": "2026-03-06", "title": "Omni-Manip: Beyond-FOV Large-Workspace Humanoid Manipulation with Omnidirectional 3D Perception", "abstract": "The deployment of humanoid robots for dexterous manipulation in unstructured environments remains challenging due to perceptual limitations that constrain the effective workspace. In scenarios where physical constraints prevent the robot from repositioning itself, maintaining omnidirectional awareness becomes far more critical than color or semantic information. While recent advances in visuomotor policy learning have improved manipulation capabilities, conventional RGB-D solutions suffer from narrow fields of view (FOV) and self-occlusion, requiring frequent base movements that introduce motion uncertainty and safety risks. Existing approaches to expanding perception, including active vision systems and third-view cameras, introduce mechanical complexity, calibration dependencies, and latency that hinder reliable real-time performance. In this work, We propose Omni-Manip, an end-to-end LiDAR-driven 3D visuomotor policy that enables robust manipulation in large workspaces. Our method processes panoramic point clouds through a Time-Aware Attention Pooling mechanism, efficiently encoding sparse 3D data while capturing temporal dependencies. This 360° perception allows the robot to interact with objects across wide areas without frequent repositioning. To support policy learning, we develop a whole-body teleoperation system for efficient data collection on full-body coordination. Extensive experiments in simulation and real-world environments show that Omni-Manip achieves robust performance in large-workspace and cluttered scenarios, outperforming baselines that rely on egocentric depth cameras.", "overview": "Proposes Omni-Manip, a LiDAR-centric 360° visuomotor policy for humanoid manipulation in large workspaces where base motion is constrained. A time-aware attention pooling mechanism encodes panoramic point clouds over time, enabling robust full-body manipulation across wide areas and clutter compared to narrow-FOV RGB-D baselines.", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.05355", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05333", "submission_date": "2026-03-06", "title": "CT-Enabled Patient-Specific Simulation and Contact-Aware Robotic Planning for Cochlear Implantation", "abstract": "Robotic cochlear-implant (CI) insertion requires precise prediction and regulation of contact forces to minimize intracochlear trauma and prevent failure modes such as locking and buckling. Aligned with the integration of advanced medical imaging and robotics for autonomous, precision interventions, this paper presents a unified CT-to-simulation pipeline for contact-aware insertion planning and validation. We develop a low-dimensional, differentiable Cosserat-rod model of the electrode array coupled with frictional contact and pseudo-dynamics regularization to ensure continuous stick-slip transitions. Patient-specific cochlear anatomy is reconstructed from CT imaging and encoded via an analytic parametrization of the scala-tympani lumen, enabling efficient and differentiable contact queries through closest-point projection. Based on a differentiated equilibrium-constraint formulation, we derive an online direction-update law under an RCM-like constraint that suppresses lateral insertion forces while maintaining axial advancement. Simulations and benchtop experiments validate deformation and force trends, demonstrating reduced locking/buckling risk and improved insertion depth. The study highlights how CT-based imaging enhances modeling, planning, and safety capabilities in robot-assisted inner-ear procedures.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.05333", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05312", "submission_date": "2026-03-06", "title": "UltraDexGrasp: Learning Universal Dexterous Grasping for Bimanual Robots with Synthetic Data", "abstract": "Grasping is a fundamental capability for robots to interact with the physical world. Humans, equipped with two hands, autonomously select appropriate grasp strategies based on the shape, size, and weight of objects, enabling robust grasping and subsequent manipulation. In contrast, current robotic grasping remains limited, particularly in multi-strategy settings. Although substantial efforts have targeted parallel-gripper and single-hand grasping, dexterous grasping for bimanual robots remains underexplored, with data being a primary bottleneck. Achieving physically plausible and geometrically conforming grasps that can withstand external wrenches poses significant challenges. To address these issues, we introduce UltraDexGrasp, a framework for universal dexterous grasping with bimanual robots. The proposed data-generation pipeline integrates optimization-based grasp synthesis with planning-based demonstration generation, yielding high-quality and diverse trajectories across multiple grasp strategies. With this framework, we curate UltraDexGrasp-20M, a large-scale, multi-strategy grasp dataset comprising 20 million frames across 1,000 objects. Based on UltraDexGrasp-20M, we further develop a simple yet effective grasp policy that takes point clouds as input, aggregates scene features via unidirectional attention, and predicts control commands. Trained exclusively on synthetic data, the policy achieves robust zero-shot sim-to-real transfer and consistently succeeds on novel objects with varied shapes, sizes, and weights, attaining an average success rate of 81.2% in real-world universal dexterous grasping. To facilitate future research on grasping with bimanual robots, we open-source the data generation pipeline at this https URL .", "overview": "Develops UltraDexGrasp, a pipeline that synthesizes diverse, physically plausible bimanual dexterous grasps via optimization and planning, yielding a 20M-frame dataset over 1,000 objects. A simple point-cloud-based policy trained solely on this synthetic data transfers zero-shot to real bimanual grasping with over 81% success on unseen objects.", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.05312", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05309", "submission_date": "2026-03-06", "title": "Constraint-Free Static Modeling of Continuum Parallel Robot", "abstract": "Continuum parallel robots (CPR) combine rigid actuation mechanisms with multiple elastic rods in a closed-loop topology, making forward statics challenging when rigid--continuum junctions are enforced by explicit kinematic constraints. Such constraint-based formulations typically introduce additional algebraic variables and complicate both numerical solution and downstream control. This paper presents a geometric exact, configuration-based and constraint-free static model of CPR that remains valid under geometrically nonlinear, large-deformation and large-rotation conditions. Connectivity constraints are eliminated by kinematic embedding, yielding a reduced unconstrained problem. Each rod of CPR is discretized by nodal poses on SE(3), while the element-wise strain field is reconstructed through a linear strain parameterization. A fourth-order Magnus approximation yields an explicit and geometrically consistent mapping between element end poses and the strain. Rigid attachments at the motor-driven base and the end-effector platforms are handled through kinematic embeddings. Based on total potential energy and virtual work, we derive assembly-ready residuals and explicit Newton tangents, and solve the resulting nonlinear equilibrium equations using a Riemannian Newton iteration on the product manifold. Experiments on a three-servomotor, six-rod prototype validate the model by showing good agreement between simulation and measurements for both unloaded motions and externally loaded cases.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.05309", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05291", "submission_date": "2026-03-06", "title": "Iterative On-Policy Refinement of Hierarchical Diffusion Policies for Language-Conditioned Manipulation", "abstract": "Hierarchical policies for language-conditioned manipulation decompose tasks into subgoals, where a high-level planner guides a low-level controller. However, these hierarchical agents often fail because the planner generates subgoals without considering the actual limitations of the controller. Existing solutions attempt to bridge this gap via intermediate modules or shared representations, but they remain limited by their reliance on fixed offline datasets. We propose HD-ExpIt, a framework for iterative fine-tuning of hierarchical diffusion policies via environment feedback. HD-ExpIt organizes training into a self-reinforcing cycle: it utilizes diffusion-based planning to autonomously discover successful behaviors, which are then distilled back into the hierarchical policy. This loop enables both components to improve while implicitly grounding the planner in the controller's actual capabilities without requiring explicit proxy models. Empirically, HD-ExpIt significantly improves hierarchical policies trained solely on offline data, achieving state-of-the-art performance on the long-horizon CALVIN benchmark among methods trained from scratch.", "overview": "Introduces HD-ExpIt, which iteratively refines hierarchical diffusion-based language-conditioned manipulation policies using environment feedback. By letting the planner and controller co-improve through self-discovered successful behaviors, it grounds high-level subgoals in actual low-level capabilities and achieves state-of-the-art performance on the long-horizon CALVIN benchmark.", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.05291", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05268", "submission_date": "2026-03-06", "title": "Curve-Induced Dynamical Systems on Riemannian Manifolds and Lie Groups", "abstract": "Deploying robots in household environments requires safe, adaptable, and interpretable behaviors that respect the geometric structure of tasks. Often represented on Lie groups and Riemannian manifolds, this includes poses on SE(3) or symmetric positive definite matrices encoding stiffness or damping matrices. In this context, dynamical system-based approaches offer a natural framework for generating such behavior, providing stability and convergence while remaining responsive to changes in the environment. We introduce Curve-induced Dynamical systems on Smooth Manifolds (CDSM), a real-time framework for constructing dynamical systems directly on Riemannian manifolds and Lie groups. The proposed approach constructs a nominal curve on the manifold, and generates a dynamical system which combines a tangential component that drives motion along the curve and a normal component that attracts the state toward the curve. We provide a stability analysis of the resulting dynamical system and validate the method quantitatively. On an S2 benchmark, CDSM demonstrates improved trajectory accuracy, reduced path deviation, and faster generation and query times compared to state-of-the-art methods. Finally, we demonstrate the practical applicability of the framework on both a robotic manipulator, where poses on SE(3) and damping matrices on SPD(n) are adapted online, and a mobile manipulator.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.05268", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05185", "submission_date": "2026-03-06", "title": "Critic in the Loop: A Tri-System VLA Framework for Robust Long-Horizon Manipulation", "abstract": "Balancing high-level semantic reasoning with low-level reactive control remains a core challenge in visual robotic manipulation. While Vision-Language Models (VLMs) excel at cognitive planning, their inference latency precludes real-time execution. Conversely, fast Vision-Language-Action (VLA) models often lack the semantic depth required for complex, long-horizon tasks. To bridge this gap, we introduce Critic in the Loop, an adaptive hierarchical framework driven by dynamic VLM-Expert scheduling. At its core is a bionic Tri-System architecture comprising a VLM brain for global reasoning, a VLA cerebellum for reactive execution, and a lightweight visual Critic. By continuously monitoring the workspace, the Critic dynamically routes control authority. It sustains rapid closed-loop execution via the VLA for routine subtasks, and adaptively triggers the VLM for replanning upon detecting execution anomalies such as task stagnation or failures. Furthermore, our architecture seamlessly integrates human-inspired rules to intuitively break infinite retry loops. This visually-grounded scheduling minimizes expensive VLM queries, while substantially enhancing system robustness and autonomy in out-of-distribution (OOD) scenarios. Comprehensive experiments on challenging, long-horizon manipulation benchmarks reveal that our approach achieves state-of-the-art performance.", "overview": "Proposes a tri-system architecture with a VLM \"brain\" for global reasoning, a fast VLA \"cerebellum\" for execution, and a visual Critic for anomaly detection and routing. The Critic adaptively triggers high-level replanning when failures or stagnation appear, boosting long-horizon manipulation robustness while minimizing expensive VLM calls.", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.05185", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05160", "submission_date": "2026-03-06", "title": "Lifelong Language-Conditioned Robotic Manipulation Learning", "abstract": "Traditional language-conditioned manipulation agent sequential adaptation to new manipulation skills leads to catastrophic forgetting of old skills, limiting dynamic scene practical deployment. In this paper, we propose SkillsCrafter, a novel robotic manipulation framework designed to continually learn multiple skills while reducing catastrophic forgetting of old skills. Specifically, we propose a Manipulation Skills Adaptation to retain the old skills knowledge while inheriting the shared knowledge between new and old skills to facilitate learning of new skills. Meanwhile, we perform the singular value decomposition on the diverse skill instructions to obtain common skill semantic subspace projection matrices, thereby recording the essential semantic space of skills. To achieve forget-less and generalization manipulation, we propose a Skills Specialization Aggregation to compute inter-skills similarity in skill semantic subspaces, achieving aggregation of the previously learned skill knowledge for any new or unknown skill. Extensive experiments demonstrate the effectiveness and superiority of our proposed SkillsCrafter.", "overview": "Introduces SkillsCrafter, a continual learning framework for language-conditioned manipulation that mitigates catastrophic forgetting. It adapts manipulation skills while extracting a shared semantic subspace over instructions and aggregates related prior skills, improving retention and generalization to new or unknown skills.", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.05160", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05117", "submission_date": "2026-03-06", "title": "SeedPolicy: Horizon Scaling via Self-Evolving Diffusion Policy for Robot Manipulation", "abstract": "Imitation Learning (IL) enables robots to acquire manipulation skills from expert demonstrations. Diffusion Policy (DP) models multi-modal expert behaviors but suffers performance degradation as observation horizons increase, limiting long-horizon manipulation. We propose Self-Evolving Gated Attention (SEGA), a temporal module that maintains a time-evolving latent state via gated attention, enabling efficient recurrent updates that compress long-horizon observations into a fixed-size representation while filtering irrelevant temporal information. Integrating SEGA into DP yields Self-Evolving Diffusion Policy (SeedPolicy), which resolves the temporal modeling bottleneck and enables scalable horizon extension with moderate overhead. On the RoboTwin 2.0 benchmark with 50 manipulation tasks, SeedPolicy outperforms DP and other IL baselines. Averaged across both CNN and Transformer backbones, SeedPolicy achieves 36.8% relative improvement in clean settings and 169% relative improvement in randomized challenging settings over the DP. Compared to vision-language-action models such as RDT with 1.2B parameters, SeedPolicy achieves competitive performance with one to two orders of magnitude fewer parameters, demonstrating strong efficiency and scalability. These results establish SeedPolicy as a state-of-the-art imitation learning method for long-horizon robotic manipulation. Code is available at: this https URL .", "overview": "Extends diffusion policies for long-horizon manipulation with Self-Evolving Gated Attention (SEGA), a recurrent temporal module that compresses long observation histories into a fixed latent state. The resulting SeedPolicy scales to longer horizons with moderate overhead and substantially outperforms standard diffusion policies and other IL baselines on 50 RoboTwin 2.0 tasks.", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.05117", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05111", "submission_date": "2026-03-06", "title": "SPIRIT: Perceptive Shared Autonomy for Robust Robotic Manipulation under Deep Learning Uncertainty", "abstract": "Deep learning (DL) has enabled impressive advances in robotic perception, yet its limited robustness and lack of interpretability hinder reliable deployment in safety critical applications. We propose a concept termed perceptive shared autonomy, in which uncertainty estimates from DL based perception are used to regulate the level of autonomy. Specifically, when the robot's perception is confident, semi-autonomous manipulation is enabled to improve performance; when uncertainty increases, control transitions to haptic teleoperation for maintaining robustness. In this way, high-performing but uninterpretable DL methods can be integrated safely into robotic systems. A key technical enabler is an uncertainty aware DL based point cloud registration approach based on the so called Neural Tangent Kernels (NTK). We evaluate perceptive shared autonomy on challenging aerial manipulation tasks through a user study of 15 participants and realization of mock-up industrial scenarios, demonstrating reliable robotic manipulation despite failures in DL based perception. The resulting system, named SPIRIT, improves both manipulation performance and system reliability. SPIRIT was selected as a finalist of a major industrial innovation award.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.05111", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05108", "submission_date": "2026-03-06", "title": "GaussTwin: Unified Simulation and Correction with Gaussian Splatting for Robotic Digital Twins", "abstract": "Digital twins promise to enhance robotic manipulation by maintaining a consistent link between real-world perception and simulation. However, most existing systems struggle with the lack of a unified model, complex dynamic interactions, and the real-to-sim gap, which limits downstream applications such as model predictive control. Thus, we propose GaussTwin, a real-time digital twin that combines position-based dynamics with discrete Cosserat rod formulations for physically grounded simulation, and Gaussian splatting for efficient rendering and visual correction. By anchoring Gaussians to physical primitives and enforcing coherent SE(3) updates driven by photometric error and segmentation masks, GaussTwin achieves stable prediction-correction while preserving physical fidelity. Through experiments in both simulation and on a Franka Research 3 platform, we show that GaussTwin consistently improves tracking accuracy and robustness compared to shape-matching and rigid-only baselines, while also enabling downstream tasks such as push-based planning. These results highlight GaussTwin as a step toward unified, physically meaningful digital twins that can support closed-loop robotic interaction and learning.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.05108", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05017", "submission_date": "2026-03-06", "title": "Direct Contact-Tolerant Motion Planning With Vision Language Models", "abstract": "Navigation in cluttered environments often requires robots to tolerate contact with movable or deformable objects to maintain efficiency. Existing contact-tolerant motion planning (CTMP) methods rely on indirect spatial representations (e.g., prebuilt map, obstacle set), resulting in inaccuracies and a lack of adaptiveness to environmental uncertainties. To address this issue, we propose a direct contact-tolerant (DCT) planner, which integrates vision-language models (VLMs) into direct point perception and navigation, including two key components. The first one is VLM point cloud partitioner (VPP), which performs contact-tolerance reasoning in image space using VLM, caches inference masks, propagates them across frames using odometry, and projects them onto the current scan to generate a contact-aware point cloud. The second innovation is VPP guided navigation (VGN), which formulates CTMP as a perception-to-control optimization problem under direct contact-aware point cloud constraints, which is further solved by a specialized deep neural network (DNN). We implement DCT in Isaac Sim and a real car-like robot, demonstrating that DCT achieves robust and efficient navigation in cluttered environments with movable obstacles, outperforming representative baselines across diverse metrics. The code is available at: this https URL .", "overview": "Presents a direct contact-tolerant planner that leverages VLM reasoning to segment environment points into contact-tolerant versus forbidden regions, forming a contact-aware point cloud. A learned navigation module then optimizes control under these constraints, enabling efficient, robust navigation through clutter with movable obstacles in both simulation and real robots.", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.05017", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04914", "submission_date": "2026-03-06", "title": "U-OBCA: Uncertainty-Aware Optimization-Based Collision Avoidance via Wasserstein Distributionally Robust Chance Constraints", "abstract": "Uncertainties arising from localization error, trajectory prediction errors of the moving obstacles and environmental disturbances pose significant challenges to robot's safe navigation. Existing uncertainty-aware planners often approximate polygon-shaped robots and obstacles using simple geometric primitives such as circles or ellipses. Though computationally convenient, these approximations substantially shrink the feasible space, leading to overly conservative trajectories and even planning failure in narrow environments. In addition, many such methods rely on specific assumptions about noise distributions, which may not hold in practice and thus limit their performance guarantees. To address these limitations, we extend the Optimization-Based Collision Avoidance (OBCA) framework to an uncertainty-aware formulation, termed \\emph{U-OBCA}. The proposed method explicitly accounts for the collision risk between polygon-shaped robots and obstacles by formulating OBCA-based chance constraints, and hence avoiding geometric simplifications and reducing unnecessary conservatism. These probabilistic constraints are further tightened into deterministic nonlinear constraints under mild distributional assumptions, which can be solved efficiently by standard numerical optimization solvers. The proposed approach is validated through theoretical analysis, numerical simulations and real-world experiments. The results demonstrate that U-OBCA significantly mitigates the conservatism in trajectory planning and achieves higher navigation efficiency compared to existing baseline methods, particularly in narrow and cluttered environments.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.04914", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04913", "submission_date": "2026-03-06", "title": "Beyond the Patch: Exploring Vulnerabilities of Visuomotor Policies via Viewpoint-Consistent 3D Adversarial Object", "abstract": "Neural network-based visuomotor policies enable robots to perform manipulation tasks but remain susceptible to perceptual attacks. For example, conventional 2D adversarial patches are effective under fixed-camera setups, where appearance is relatively consistent; however, their efficacy often diminishes under dynamic viewpoints from moving cameras, such as wrist-mounted setups, due to perspective distortions. To proactively investigate potential vulnerabilities beyond 2D patches, this work proposes a viewpoint-consistent adversarial texture optimization method for 3D objects through differentiable rendering. As optimization strategies, we employ Expectation over Transformation (EOT) with a Coarse-to-Fine (C2F) curriculum, exploiting distance-dependent frequency characteristics to induce textures effective across varying camera-object distances. We further integrate saliency-guided perturbations to redirect policy attention and design a targeted loss that persistently drives robots toward adversarial objects. Our comprehensive experiments show that the proposed method is effective under various environmental conditions, while confirming its black-box transferability and real-world applicability.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.04913", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04910", "submission_date": "2026-03-06", "title": "VPWEM: Non-Markovian Visuomotor Policy with Working and Episodic Memory", "abstract": "Imitation learning from human demonstrations has achieved significant success in robotic control, yet most visuomotor policies still condition on single-step observations or short-context histories, making them struggle with non-Markovian tasks that require long-term memory. Simply enlarging the context window incurs substantial computational and memory costs and encourages overfitting to spurious correlations, leading to catastrophic failures under distribution shift and violating real-time constraints in robotic systems. By contrast, humans can compress important past experiences into long-term memories and exploit them to solve tasks throughout their lifetime. In this paper, we propose VPWEM, a non-Markovian visuomotor policy equipped with working and episodic memories. VPWEM retains a sliding window of recent observation tokens as short-term working memory, and introduces a Transformer-based contextual memory compressor that recursively converts out-of-window observations into a fixed number of episodic memory tokens. The compressor uses self-attention over a cache of past summary tokens and cross-attention over a cache of historical observations, and is trained jointly with the policy. We instantiate VPWEM on diffusion policies to exploit both short-term and episode-wide information for action generation with nearly constant memory and computation per step. Experiments demonstrate that VPWEM outperforms state-of-the-art baselines including diffusion policies and vision-language-action (VLA) models by more than 20% on the memory-intensive manipulation tasks in MIKASA and achieves an average 5% improvement on the mobile manipulation benchmark MoMaRT. Code is available at this https URL .", "overview": "Proposes VPWEM, a visuomotor policy architecture that combines a short-term working memory window with a learned episodic memory compressor to handle long, non-Markovian manipulation tasks. Integrated with diffusion policies, it maintains near-constant per-step compute while improving performance on memory-intensive benchmarks like MIKASA and MoMaRT.", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.04910", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04848", "submission_date": "2026-03-06", "title": "Hyperbolic Multiview Pretraining for Robotic Manipulation", "abstract": "3D-aware visual pretraining has proven effective in improving the performance of downstream robotic manipulation tasks. However, existing methods are constrained to Euclidean embedding spaces, whose flat geometry limits their ability to model structural relations among embeddings. As a result, they struggle to learn structured embeddings that are essential for robust spatial perception in robotic applications. To this end, we propose HyperMVP, a self-supervised framework for \\underline{Hyper}bolic \\underline{M}ulti\\underline{V}iew \\underline{P}retraining. Hyperbolic space offers geometric properties well suited for capturing structural relations. Methodologically, we extend the masked autoencoder paradigm and design a GeoLink encoder to learn multiview hyperbolic representations. The pretrained encoder is then finetuned with visuomotor policies on manipulation tasks. In addition, we introduce 3D-MOV, a large-scale dataset comprising multiple types of 3D point clouds to support pretraining. We evaluate HyperMVP on COLOSSEUM, RLBench, and real-world scenarios, where it consistently outperforms strong baselines across diverse tasks and perturbation settings. Our results highlight the potential of 3D-aware pretraining in a non-Euclidean space for learning robust and generalizable robotic manipulation policies.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.04848", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04845", "submission_date": "2026-03-06", "title": "Task-Relevant and Irrelevant Region-Aware Augmentation for Generalizable Vision-Based Imitation Learning in Agricultural Manipulation", "abstract": "Vision-based imitation learning has shown promise for robotic manipulation; however, its generalization remains limited in practical agricultural tasks. This limitation stems from scarce demonstration data and substantial visual domain gaps caused by i) crop-specific appearance diversity and ii) background variations. To address this limitation, we propose Dual-Region Augmentation for Imitation Learning (DRAIL), a region-aware augmentation framework designed for generalizable vision-based imitation learning in agricultural manipulation. DRAIL explicitly separates visual observations into task-relevant and task-irrelevant regions. The task-relevant region is augmented in a domain-knowledge-driven manner to preserve essential visual characteristics, while the task-irrelevant region is aggressively randomized to suppress spurious background correlations. By jointly handling both sources of visual variation, DRAIL promotes learning policies that rely on task-essential features rather than incidental visual cues. We evaluate DRAIL on diffusion policy-based visuomotor controllers through robot experiments on artificial vegetable harvesting and real lettuce defective leaf picking preparation tasks. The results show consistent improvements in success rates under unseen visual conditions compared to baseline methods. Further attention analysis and representation generalization metrics indicate that the learned policies rely more on task-essential visual features, resulting in enhanced robustness and generalization.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.04845", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04760", "submission_date": "2026-03-06", "title": "Designing and Validating a Self-Aligning Tool Changer for Modular Reconfigurable Manipulation Robots", "abstract": "Modular reconfigurable robots require reliable mechanisms for automated module exchange, but conventional rigid active couplings often fail due to inevitable positioning and orientational errors. To address this, we propose a misalignment-tolerant tool-changing system. The hardware features a motor-driven coupling utilizing passive self-alignment geometries, specifically chamfered receptacles and triangular lead-in guides, to robustly compensate for angular and lateral misalignments without complex force sensors. To make this autonomous exchange practically feasible, the mechanism is complemented by a compact rotating tool exchange station for efficient module storage. Real-world autonomous tool-picking experiments validate that the self-aligning features successfully absorb execution errors, enabling highly reliable robotic tool reconfiguration.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.04760", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04757", "submission_date": "2026-03-06", "title": "Gait Generation Balancing Joint Load and Mobility for Legged Modular Robots with Easily Detachable Joints", "abstract": "While modular robots offer versatility, excessive joint torque during locomotion poses a significant risk of mechanical failure, especially for detachable joints. To address this, we propose an optimization framework using the NSGA-III algorithm. Unlike conventional approaches that prioritize mobility alone, our method derives Pareto optimal solutions to minimize joint load while maintaining necessary locomotion speed and stability. Simulations and physical experiments demonstrate that our approach successfully generates gait motions for diverse environments, such as slopes and steps, ensuring structural integrity without compromising overall mobility.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.04757", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04705", "submission_date": "2026-03-06", "title": "LEGS-POMDP: Language and Gesture-Guided Object Search in Partially Observable Environments", "abstract": "To assist humans in open-world environments, robots must interpret ambiguous instructions to locate desired objects. Foundation model-based approaches excel at multimodal grounding, but they lack a principled mechanism for modeling uncertainty in long-horizon tasks. In contrast, Partially Observable Markov Decision Processes (POMDPs) provide a systematic framework for planning under uncertainty but are often limited in supported modalities and rely on restrictive environment assumptions. We introduce LanguagE and Gesture-Guided Object Search in Partially Observable Environments (LEGS-POMDP), a modular POMDP system that integrates language, gesture, and visual observations for open-world object search. Unlike prior work, LEGS-POMDP explicitly models two sources of partial observability: uncertainty over the target object's identity and its spatial location. In simulation, multimodal fusion significantly outperforms unimodal baselines, achieving an average success rate of 89\\% across challenging environments and object categories. Finally, we demonstrate the full system on a quadruped mobile manipulator, where real-world experiments qualitatively validate robust multimodal perception and uncertainty reduction under ambiguous instructions.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.04705", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04668", "submission_date": "2026-03-06", "title": "Python Bindings for a Large C++ Robotics Library: The Case of OMPL", "abstract": "Python bindings are a critical bridge between high-performance C++ libraries and the flexibility of Python, enabling rapid prototyping, reproducible experiments, and integration with simulation and learning frameworks in robotics research. Yet, generating bindings for large codebases is a tedious process that creates a heavy burden for a small group of maintainers. In this work, we investigate the use of Large Language Models (LLMs) to assist in generating nanobind wrappers, with human experts kept in the loop. Our workflow mirrors the structure of the C++ codebase, scaffolds empty wrapper files, and employs LLMs to fill in binding definitions. Experts then review and refine the generated code to ensure correctness, compatibility, and performance. Through a case study on a large C++ motion planning library, we document common failure modes, including mismanaging shared pointers, overloads, and trampolines, and show how in-context examples and careful prompt design improve reliability. Experiments demonstrate that the resulting bindings achieve runtime performance comparable to legacy solutions. Beyond this case study, our results provide general lessons for applying LLMs to binding generation in large-scale C++ projects.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.04668", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04659", "submission_date": "2026-03-06", "title": "GIANT - Global Path Integration and Attentive Graph Networks for Multi-Agent Trajectory Planning", "abstract": "This paper presents a novel approach to multi-robot collision avoidance that integrates global path planning with local navigation strategies, utilizing attentive graph neural networks to manage dynamic interactions among agents. We introduce a local navigation model that leverages pre-planned global paths, allowing robots to adhere to optimal routes while dynamically adjusting to environmental changes. The models robustness is enhanced through the introduction of noise during training, resulting in superior performance in complex, dynamic environments. Our approach is evaluated against established baselines, including NH-ORCA, DRL-NAV, and GA3C-CADRL, across various structurally diverse simulated scenarios. The results demonstrate that our model achieves consistently higher success rates, lower collision rates, and more efficient navigation, particularly in challenging scenarios where baseline models struggle. This work offers an advancement in multi-robot navigation, with implications for robust performance in complex, dynamic environments with varying degrees of complexity, such as those encountered in logistics, where adaptability is essential for accommodating unforeseen obstacles and unpredictable changes.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.04659", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04639", "submission_date": "2026-03-06", "title": "RoboMME: Benchmarking and Understanding Memory for Robotic Generalist Policies", "abstract": "Memory is critical for long-horizon and history-dependent robotic manipulation. Such tasks often involve counting repeated actions or manipulating objects that become temporarily occluded. Recent vision-language-action (VLA) models have begun to incorporate memory mechanisms; however, their evaluations remain confined to narrow, non-standardized settings. This limits their systematic understanding, comparison, and progress measurement. To address these challenges, we introduce RoboMME: a large-scale standardized benchmark for evaluating and advancing VLA models in long-horizon, history-dependent scenarios. Our benchmark comprises 16 manipulation tasks constructed under a carefully designed taxonomy that evaluates temporal, spatial, object, and procedural memory. We further develop a suite of 14 memory-augmented VLA variants built on the {\\pi}0.5 backbone to systematically explore different memory representations across multiple integration strategies. Experimental results show that the effectiveness of memory representations is highly task-dependent, with each design offering distinct advantages and limitations across different tasks. Videos and code can be found at our website this https URL .", "overview": "Introduces RoboMME, a standardized benchmark of 16 manipulation tasks designed to probe temporal, spatial, object, and procedural memory in vision-language-action (VLA) models. Builds 14 memory-augmented variants on the π0.5 backbone, showing that optimal memory representations are highly task-dependent and enabling systematic comparison of long-horizon, history-dependent policies.", "institution_tags": ["Stanford University"], "institution_match": true, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.04639", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04585", "submission_date": "2026-03-06", "title": "ELLIPSE: Evidential Learning for Robust Waypoints and Uncertainties", "abstract": "Robust waypoint prediction is crucial for mobile robots operating in open-world, safety-critical settings. While Imitation Learning (IL) methods have demonstrated great success in practice, they are susceptible to distribution shifts: the policy can become dangerously overconfident in unfamiliar states. In this paper, we present \\textit{ELLIPSE}, a method building on multivariate deep evidential regression to output waypoints and multivariate Student-t predictive distributions in a single forward pass. To reduce covariate-shift-induced overconfidence under viewpoint and pose perturbations near expert trajectories, we introduce a lightweight domain augmentation procedure that synthesizes plausible viewpoint/pose variations without collecting additional demonstrations. To improve uncertainty reliability under environment/domain shift (e.g., unseen staircases), we apply a post-hoc isotonic recalibration on probability integral transform (PIT) values so that prediction sets remain plausible during deployment. We ground the discussion and experiments in staircase waypoint prediction, where obtaining robust waypoint and uncertainty is pivotal. Extensive real world evaluations show that \\textit{ELLIPSE} improves both task success rate and uncertainty coverage compared to baselines.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.04585", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04579", "submission_date": "2026-03-06", "title": "Risk-Aware Reinforcement Learning for Mobile Manipulation", "abstract": "For robots to successfully transition from lab settings to everyday environments, they must begin to reason about the risks associated with their actions and make informed, risk-aware decisions. This is particularly true for robots performing mobile manipulation tasks, which involve both interacting with and navigating within dynamic, unstructured spaces. However, existing whole-body controllers for mobile manipulators typically lack explicit mechanisms for risk-sensitive decision-making under uncertainty. To our knowledge, we are the first to (i) learn risk-aware visuomotor policies for mobile manipulation conditioned on egocentric depth observations with runtime-adjustable risk sensitivity, and (ii) show risk-aware behaviours can be transferred through Imitation Learning (IL) to a visuomotor policy conditioned on egocentric depth observations. Our method achieves this by first training a privileged teacher policy using Distributional Reinforcement Learning (DRL), with a risk-neutral distributional critic. Distortion risk-metrics are then applied to the critic's predicted return distribution to calculate risk-adjusted advantage estimates used in policy updates to achieve a range of risk-aware behaviours. We then distil teacher policies with IL to obtain risk-aware student policies conditioned on egocentric depth observations. We perform extensive evaluations demonstrating that our trained visuomotor policies exhibit risk-aware behaviour (specifically achieving better worst-case performance) while performing reactive whole-body motions in unmapped environments, leveraging live depth observations for perception.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.04579", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04560", "submission_date": "2026-03-06", "title": "From Local Corrections to Generalized Skills: Improving Neuro-Symbolic Policies with MEMO", "abstract": "Recent works use a neuro-symbolic framework for general manipulation policies. The advantage of this framework is that -- by applying off-the-shelf vision and language models -- the robot can break complex tasks down into semantic subtasks. However, the fundamental bottleneck is that the robot needs skills to ground these subtasks into embodied motions. Skills can take many forms (e.g., trajectory snippets, motion primitives, coded functions), but regardless of their form skills act as a constraint. The high-level policy can only ground its language reasoning through the available skills; if the robot cannot generate the right skill for the current task, its policy will fail. We propose to address this limitation -- and dynamically expand the robot's skills -- by leveraging user feedback. When a robot fails, humans can intuitively explain what went wrong (e.g., ``no, go higher''). While a simple approach is to recall this exact text the next time the robot faces a similar situation, we hypothesize that by collecting, clustering, and re-phrasing natural language corrections across multiple users and tasks, we can synthesize more general text guidance and coded skill templates. Applying this hypothesis we develop Memory Enhanced Manipulation (MEMO). MEMO builds and maintains a retrieval-augmented skillbook gathered from human feedback and task successes. At run time, MEMO retrieves relevant text and code from this skillbook, enabling the robot's policy to generate new skills while reasoning over multi-task human feedback. Our experiments demonstrate that using MEMO to aggregate local feedback into general skill templates enables generalization to novel tasks where existing baselines fall short. See supplemental material here: this https URL", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.04560", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04547", "submission_date": "2026-03-06", "title": "Many-RRT*: Robust Joint-Space Trajectory Planning for Serial Manipulators", "abstract": "The rapid advancement of high degree-of-freedom (DoF) serial manipulators necessitates the use of swift, sampling-based motion planners for high-dimensional spaces. While sampling-based planners like the Rapidly-Exploring Random Tree (RRT) are widely used, planning in the manipulator's joint space presents significant challenges due to non-invertible forward kinematics. A single task-space end-effector pose can correspond to multiple configuration-space states, creating a multi-arm bandit problem for the planner. In complex environments, simply choosing the wrong joint space goal can result in suboptimal trajectories or even failure to find a viable plan. To address this planning problem, we propose Many-RRT*: an extension of RRT*-Connect that plans to multiple goals in parallel. By generating multiple IK solutions and growing independent trees from these goal configurations simultaneously alongside a single start tree, Many-RRT* ensures that computational effort is not wasted on suboptimal IK solutions. This approach maintains robust convergence and asymptotic optimality. Experimental evaluations across robot morphologies and diverse obstacle environments demonstrate that Many-RRT* provides higher quality trajectories (44.5% lower cost in the same runtime) with a significantly higher success rate (100% vs. the next best of 1.6%) than previous RRT iterations without compromising on runtime performance.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.04547", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04531", "submission_date": "2026-03-06", "title": "PTLD: Sim-to-real Privileged Tactile Latent Distillation for Dexterous Manipulation", "abstract": "Tactile dexterous manipulation is essential to automating complex household tasks, yet learning effective control policies remains a challenge. While recent work has relied on imitation learning, obtaining high quality demonstrations for multi-fingered hands via robot teleoperation or kinesthetic teaching is prohibitive. Alternatively, with reinforcement we can learn skills in simulation, but fast and realistic simulation of tactile observations is challenging. To bridge this gap, we introduce PTLD: sim-to-real Privileged Tactile Latent Distillation, a novel approach to learning tactile manipulation skills without requiring tactile simulation. Instead of simulating tactile sensors or relying purely on proprioceptive policies to transfer zero-shot sim-to-real, our key idea is to leverage privileged sensors in the real world to collect real-world tactile policy data. This data is then used to distill a robust state estimator that operates on tactile input. We demonstrate from our experiments that PTLD can be used to improve proprioceptive manipulation policies trained in simulation significantly by incorporating tactile sensing. On the benchmark in-hand rotation task, PTLD achieves a 182% improvement over a proprioception only policy. We also show that PTLD enables learning the challenging task of tactile in-hand reorientation where we see a 57% improvement in the number of goals reached over using proprioception alone. Website: this https URL .", "overview": "Proposes PTLD, a sim-to-real framework that avoids simulating tactile sensors by first learning privileged real-world tactile policies and then distilling them into a tactile state estimator. Augmenting proprioceptive sim-trained policies with this estimator substantially improves in-hand rotation and reorientation performance, highlighting a practical route to tactile dexterous skills.", "institution_tags": ["Carnegie Mellon University", "UC Berkeley", "University of Washington"], "institution_match": true, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.04531", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04470", "submission_date": "2026-03-06", "title": "Efficient Autonomous Navigation of a Quadruped Robot in Underground Mines on Edge Hardware", "abstract": "Embodied navigation in underground mines faces significant challenges, including narrow passages, uneven terrain, near-total darkness, GPS-denied conditions, and limited communication infrastructure. While recent learning-based approaches rely on GPU-accelerated inference and extensive training data, we present a fully autonomous navigation stack for a Boston Dynamics Spot quadruped robot that runs entirely on a low-power Intel NUC edge computer with no GPU and no network connectivity requirements. The system integrates LiDAR-inertial odometry, scan-matching localization against a prior map, terrain segmentation, and visibility-graph global planning with a velocity-regulated local path follower, achieving real-time perception-to-action at consistent control rates. After a single mapping pass of the environment, the system handles arbitrary goal locations within the known map without any environment-specific training or learned components. We validate the system through repeated field trials using four target locations of varying traversal difficulty in an experimental underground mine, accumulating over 700 m of fully autonomous traverse with a 100% success rate across all 20 trials (5 repetitions x 4 targets) and an overall Success weighted by Path Length (SPL) of 0.73 \\pm 0.09.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.04470", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04466", "submission_date": "2026-03-06", "title": "Act-Observe-Rewrite: Multimodal Coding Agents as In-Context Policy Learners for Robot Manipulation", "abstract": "Can a multimodal language model learn to manipulate physical objects by reasoning about its own failures-without gradient updates, demonstrations, or reward engineering? We argue the answer is yes, under conditions we characterise precisely. We present Act-Observe-Rewrite (AOR), a framework in which an LLM agent improves a robot manipulation policy by synthesising entirely new executable Python controller code between trials, guided by visual observations and structured episode outcomes. Unlike prior work that grounds LLMs in pre-defined skill libraries or uses code generation for one-shot plan synthesis, AOR makes the full low-level motor control implementation the unit of LLM reasoning, enabling the agent to change not just what the robot does, but how it does it. The central claim is that interpretable code as the policy representation creates a qualitatively different kind of in-context learning from opaque neural policies: the agent can diagnose systematic failures and rewrite their causes. We validate this across three robosuite manipulation tasks and report promising results, with the agent achieving high success rates without demonstrations, reward engineering, or gradient updates.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.04466", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.04463", "submission_date": "2026-03-06", "title": "GAIDE: Graph-based Attention Masking for Spatial- and Embodiment-aware Motion Planning", "abstract": "Sampling-based motion planning algorithms are widely used for motion planning of robotic manipulators, but they often struggle with sample inefficiency in high-dimensional configuration spaces due to their reliance on uniform or hand-crafted informed sampling primitives. Neural informed samplers address this limitation by learning the sampling distribution from prior planning experience to guide the motion planner towards planning goal. However, existing approaches often struggle to encode the spatial structure inherent in motion planning problems. To address this limitation, we introduce Graph-based Attention Masking for Spatial- and Embodiment-aware Motion Planning (GAIDE), a neural informed sampler that leverages both the spatial structure of the planning problem and the robotic manipulator's embodiment to guide the planning algorithm. GAIDE represents these structures as a graph and integrates it into a transformer-based neural sampler through attention masking. We evaluate GAIDE against baseline state-of-the-art sampling-based planners using uniform sampling, hand-crafted informed sampling, and neural informed sampling primitives. Evaluation results demonstrate that GAIDE improves planning efficiency and success rate.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 3, "abs_url": "https://arxiv.org/abs/2603.04463", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05230", "submission_date": "2026-03-06", "title": "Digital Twin Driven Textile Classification and Foreign Object Recognition in Automated Sorting Systems", "abstract": "The increasing demand for sustainable textile recycling requires robust automation solutions capable of handling deformable garments and detecting foreign objects in cluttered environments. This work presents a digital twin driven robotic sorting system that integrates grasp prediction, multi modal perception, and semantic reasoning for real world textile classification. A dual arm robotic cell equipped with RGBD sensing, capacitive tactile feedback, and collision-aware motion planning autonomously separates garments from an unsorted basket, transfers them to an inspection zone, and classifies them using state of the art Visual Language Models (VLMs). We benchmark nine VLM s from five model families on a dataset of 223 inspection scenarios comprising shirts, socks, trousers, underwear, foreign objects (including garments outside of the aforementioned classes), and empty scenes. The evaluation assesses per class accuracy, hallucination behavior, and computational performance under practical hardware constraints. Results show that the Qwen model family achieves the highest overall accuracy (up to 87.9 %), with strong foreign object detection performance, while lighter models such as Gemma3 offer competitive speed accuracy trade offs for edge deployment. A digital twin combined with MoveIt enables collision aware path planning and integrates segmented 3D point clouds of inspected garments into the virtual environment for improved manipulation reliability. The presented system demonstrates the feasibility of combining semantic VLM reasoning with conventional grasp detection and digital twin technology for scalable, autonomous textile sorting in realistic industrial settings.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.05230", "briefing_path": "2026-03-07/2026-03-07.html"}, {"paper_id": "arXiv:2603.05147", "submission_date": "2026-03-06", "title": "Act, Think or Abstain: Complexity-Aware Adaptive Inference for Vision-Language-Action Models", "abstract": "Current research on Vision-Language-Action (VLA) models predominantly focuses on enhancing generalization through established reasoning techniques. While effective, these improvements invariably increase computational complexity and inference latency. Furthermore, these mechanisms are typically applied indiscriminately, resulting in the inefficient allocation of resources for trivial tasks while simultaneously failing to provide the uncertainty estimation necessary to prevent catastrophic failure on out-of-distribution tasks. Inspired by human cognition, we propose an adaptive framework that dynamically routes VLA execution based on the complexity of the perceived state. Our approach transforms the VLA's vision-language backbone into an active detection tool by projecting latent embeddings into an ensemble of parametric and non-parametric estimators. This allows the system to execute known tasks immediately (Act), reason about ambiguous scenarios (Think), and preemptively halt execution when encountering significant physical or semantic anomalies (Abstain). In our empirical analysis, we observe a phenomenon where visual embeddings alone are superior for inferring task complexity due to the semantic invariance of language. Evaluated on the LIBERO and LIBERO-PRO benchmarks as well as on a real robot, our vision-only configuration achieves 80% F1-Score using as little as 5% of training data, establishing itself as a reliable and efficient task complexity detector.", "overview": "", "institution_tags": [], "institution_match": false, "topic_match": true, "topic_relevance": 2, "abs_url": "https://arxiv.org/abs/2603.05147", "briefing_path": "2026-03-07/2026-03-07.html"}]</script>
  <script>
    const indexEl = document.getElementById('search-index');
    const allPapers = JSON.parse(indexEl.textContent || '[]');
    const inputEl = document.getElementById('paper-search');
    const resultsEl = document.getElementById('search-results');
    const statusEl = document.getElementById('search-status');

    const normalize = (value) => value.toLowerCase().replace(/\s+/g, ' ').trim();
    const escapeHtml = (value) => value
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const matchPaper = (paper, terms) => {
      const title = normalize(paper.title || '');
      const abstract = normalize(paper.abstract || '');
      const overview = normalize(paper.overview || '');
      const institutionTags = (paper.institution_tags || []).map((tag) => normalize(tag)).join(' ');
      return terms.every((term) => title.includes(term) || abstract.includes(term) || overview.includes(term) || institutionTags.includes(term));
    };

    const scorePaper = (paper, terms) => {
      const title = normalize(paper.title || '');
      const abstract = normalize(paper.abstract || '');
      const overview = normalize(paper.overview || '');
      const institutionTags = (paper.institution_tags || []).map((tag) => normalize(tag)).join(' ');
      let score = 0;
      for (const term of terms) {
        if (title.includes(term)) score += 5;
        if (abstract.includes(term)) score += 4;
        if (institutionTags.includes(term)) score += 3;
        if (overview.includes(term)) score += 2;
      }
      score += Number(paper.topic_relevance || 0);
      return score;
    };

    const renderResults = (papers, terms) => {
      if (!papers.length) {
        resultsEl.innerHTML = '<p class="muted">No matching papers found.</p>';
        return;
      }

      const topResults = papers.slice(0, 50);
      resultsEl.innerHTML = topResults.map((paper) => {
        const snippetSource = paper.abstract || paper.overview || '';
        const snippet = snippetSource.length > 420 ? `${snippetSource.slice(0, 420)}...` : snippetSource;
        const tags = [
          paper.institution_match ? 'institution match' : '',
          paper.topic_match ? 'topic match' : '',
        ].filter(Boolean).join(' · ');
        return `
          <article class="result-item">
            <div><a href="${escapeHtml(paper.abs_url || '#')}" target="_blank" rel="noopener noreferrer">${escapeHtml(paper.title || '(untitled)')}</a></div>
            <div class="result-meta">${escapeHtml(paper.submission_date || '')} · ${escapeHtml(tags)}</div>
            <p>${escapeHtml(snippet)}</p>
            <div class="result-meta"><a href="${escapeHtml(paper.briefing_path || '#')}">Open daily briefing</a></div>
          </article>
        `;
      }).join('');
    };

    const runSearch = () => {
      const query = normalize(inputEl.value || '');
      if (query.length < 2) {
        statusEl.textContent = 'Type at least 2 characters to search.';
        resultsEl.innerHTML = '';
        return;
      }

      const terms = query.split(' ').filter(Boolean);
      const matches = allPapers
        .filter((paper) => matchPaper(paper, terms))
        .map((paper) => ({ ...paper, _score: scorePaper(paper, terms) }))
        .sort((a, b) => (b._score - a._score) || String(b.submission_date).localeCompare(String(a.submission_date)));

      statusEl.textContent = `Found ${matches.length} matching paper${matches.length === 1 ? '' : 's'}.`;
      renderResults(matches, terms);
    };

    inputEl.addEventListener('input', runSearch);
  </script>
