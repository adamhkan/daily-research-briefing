name: Daily Robotics Briefing

on:
  workflow_dispatch:
  schedule:
    - cron: "15 11 * * *" # daily

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure filter file exists
        run: |
          if [ ! -f config/filters.yaml ]; then
            cp config/filters.example.yaml config/filters.yaml
          fi

      - name: Generate briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PYTHONPATH=src python -m daily_robotics_briefing.main \
            --filters config/filters.yaml

      - name: Ensure GitHub Pages static settings
        run: |
          touch reports/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

      - name: Commit report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No report changes"
          else
            git commit -m "chore: add daily robotics briefing"
            git push
          fi
          
  deploy-pages:
      runs-on: ubuntu-latest
      needs: build-briefing
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
  
      steps:
        - name: Setup Pages
          uses: actions/configure-pages@v5
  
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
